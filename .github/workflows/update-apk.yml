name: Update APK

on:
  workflow_dispatch:         # allow manual trigger from Actions tab

permissions:
  contents: write            # needed to create/update releases

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve final URL
        id: resolve
        run: |
          FINAL_URL=$(curl -Ls -o /dev/null -w '%{url_effective}' "https://dnull.xyz/latest_bs")
          echo "url=$FINAL_URL" >> "$GITHUB_OUTPUT"

          # Parse filename like: nb_xx.xxx_release_yyyyyyyy.apk
          FILENAME=$(basename "$FINAL_URL")
          STEM="${FILENAME%.apk}"                                           # nb_xx.xxx_release_yyyyyyyy

          VERSION=$(echo "$STEM" | grep -oP '[\d]+\.[\d]+' || true)       # xx.xxx
          COMMIT=$(echo "$STEM"  | grep -oP '[0-9a-f]{7,}$' || true)      # yyyyyyyy

          # Fallbacks if pattern doesn't match
          [ -z "$VERSION" ] && VERSION=$(date -u +%Y%m%d-%H%M)
          TAG="${VERSION}${COMMIT:+-${COMMIT}}"                             # xx.xxx-yyyyyyyy
          TITLE="${VERSION}${COMMIT:+ (${COMMIT})}"                        # xx.xxx (yyyyyyyy)

          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "title=$TITLE"      >> "$GITHUB_OUTPUT"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Check if this version is already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh release view "${{ steps.resolve.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName -q .tagName 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.resolve.outputs.tag }} already published, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download APK
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -L --retry 3 --retry-delay 2 \
               -o "${{ steps.resolve.outputs.filename }}" \
               "${{ steps.resolve.outputs.url }}"

      - name: Publish GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.resolve.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.resolve.outputs.title }}" \
            --notes "Auto-mirrored from dnull.xyz/latest_bs" \
            "${{ steps.resolve.outputs.filename }}"

      - name: Delete old releases
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName -q '.[].tagName' | \
            grep -v "^${{ steps.resolve.outputs.tag }}$" | \
            while read -r OLD_TAG; do
              echo "Deleting release and tag: $OLD_TAG"
              gh release delete "$OLD_TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            done